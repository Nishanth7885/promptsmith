# /etc/nginx/sites-available/promptsmith
#
# Activated with:
#   sudo ln -s /etc/nginx/sites-available/promptsmith /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# This file is the PRE-CERTBOT version (port 80 only). Run Certbot once and it
# will append a 443 SSL server block + redirect automatically:
#
#   sudo certbot --nginx -d promptsmith.ink -d www.promptsmith.ink --redirect
#
# After Certbot runs, this same file will contain both the port 80 redirect
# block and the port 443 SSL block — don't copy this template back over it.

server {
    listen 80;
    listen [::]:80;
    server_name promptsmith.ink www.promptsmith.ink;

    # ACME challenge path for Certbot's HTTP-01 method.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Static assets directly from the Next.js standalone build.
    location /_next/static/ {
        alias /opt/promptsmith/current/.next/static/;
        expires 365d;
        access_log off;
    }
    location = /favicon.ico {
        alias /opt/promptsmith/current/public/favicon.ico;
        expires 30d;
    }

    # Cashfree webhook — must NOT buffer, must NOT cache.
    location = /api/cashfree/webhook {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → Next.js (Node, port 3000).
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        client_max_body_size 1m;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
