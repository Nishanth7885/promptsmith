# /etc/nginx/sites-available/promptsmith
# Activated with:
#   sudo ln -s /etc/nginx/sites-available/promptsmith /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Certbot will rewrite the server blocks below to add the SSL listener and
# certificate paths the first time you run:
#   sudo certbot --nginx -d promptsmith.ink -d www.promptsmith.ink

server {
    listen 80;
    listen [::]:80;
    server_name promptsmith.ink www.promptsmith.ink;

    # Let Certbot's webroot challenge through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS (Certbot adds the redirect on first run)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name promptsmith.ink www.promptsmith.ink;

    # Certbot fills these in on first run:
    # ssl_certificate     /etc/letsencrypt/live/promptsmith.ink/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/promptsmith.ink/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Pass real client IP + scheme to Node so Auth.js + tracking work right.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # Generous body size — checkout payloads are tiny but webhook payloads
    # from Cashfree can be a few KB.
    client_max_body_size 1m;

    # Gzip — Next already compresses HTML+JS, but Nginx handles fonts/static.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Static assets from Next standalone served directly
    location /_next/static/ {
        alias /opt/promptsmith/current/.next/static/;
        expires 365d;
        access_log off;
    }
    location /favicon.ico {
        alias /opt/promptsmith/current/public/favicon.ico;
        expires 30d;
    }

    # Everything else → Node app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90s;
    }

    # Webhook endpoint must NOT be cached or buffered
    location = /api/cashfree/webhook {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
